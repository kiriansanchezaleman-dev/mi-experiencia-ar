<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Experiencia AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #f5f5f5; }
        model-viewer { width: 100%; height: 100%; }
        .ar-button { background-color: #ffffff; border-radius: 8px; border: none; position: absolute; bottom: 20px; right: 20px; padding: 12px 24px; font-weight: bold; box-shadow: 0px 4px 10px rgba(0,0,0,0.15); font-family: sans-serif; cursor: pointer; }
    </style>
</head>
<body>

    <model-viewer 
        src="Cubo-RA-Fanzine.glb"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        tone-mapping="neutral" 
        shadow-intensity="1">
        
        <button slot="ar-button" class="ar-button">
            📐 Ver en Realidad Aumentada
        </button>
    </model-viewer>

</body>
</html>
